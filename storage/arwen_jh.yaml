# arwen-jh.yaml
# SC only - dynamic provisioning for JupyterHub user PVCs, no static PV/PVC needed
---
# arwen jh sc (default)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-arwen-jh
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: nfs.csi.k8s.io
parameters:
  server: 172.29.180.195 # arwen scripps ip
  share: /srv/nfs/jupyterhub
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions:
  - hard
  - proto=tcp
